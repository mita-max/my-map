<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶典</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            /* 復古配色：羊皮紙背景、古銅金強調色、深皮革色選單 */
            --bg-parchment: #F5EEDC; /* 復古羊皮紙色 */
            --text-classic: #2c2c2c; 
            --accent-bronze: #C5A059; /* 古銅色邊框與強調 */
            --sidebar-leather: #4B3621; /* 深皮革色側邊欄 */
            --ios-menu-bg: rgba(240, 240, 240, 0.96); /* iOS 风格氣泡選單背景 */
            --modal-bg: #FAF3E0;
        }
        
        body { 
            margin: 0; font-family: 'EB Garamond', 'PingFang TC', serif; 
            background: var(--bg-parchment); color: var(--text-classic); 
            overflow: hidden; touch-action: none; 
            /* 加個淡淡的紋理 */
            background-image: url('https://www.transparenttextures.com/patterns/old-paper.png');
        }
        
        /* 左上角漢堡選單按鈕（復古風） */
        #menu-btn { 
            position: fixed; top: 20px; left: 20px; z-index: 2000; 
            background: var(--sidebar-leather); border: 2px solid var(--accent-bronze);
            color: var(--accent-bronze); width: 45px; height: 45px; 
            border-radius: 8px; font-size: 28px; display: flex; 
            align-items: center; justify-content: center; cursor: pointer;
        }

        /* 側邊隱藏選單（復古皮革風） */
        #sidebar { 
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%; 
            background: var(--sidebar-leather); transition: 0.3s; z-index: 1999;
            padding: 80px 20px 20px; box-shadow: 2px 0 15px rgba(0,0,0,0.5);
            overflow-y: auto; border-right: 2px solid var(--accent-bronze);
            color: #d8c4a9;
        }
        #sidebar.open { left: 0; }
        #sidebar h4 { color: var(--accent-bronze); margin-top: 0; border-bottom: 1px solid var(--accent-bronze); padding-bottom: 5px;}

        /* 輸入框與按鈕復古風 */
        input, select { 
            width: 100%; padding: 10px; margin-bottom: 15px; 
            background: #d8c4a9; border: 1px solid var(--sidebar-leather); 
            color: var(--sidebar-leather); border-radius: 4px; box-sizing: border-box;
            font-family: inherit;
        }
        .btn { 
            width: 100%; padding: 12px; background: var(--accent-bronze); border: none; 
            color: var(--sidebar-leather); border-radius: 6px; cursor: pointer; 
            font-size: 16px; font-weight: bold; font-family: inherit;
        }
        .btn:active { opacity: 0.8; }
        
        /* 畫布 */
        #canvas { position: absolute; top: 0; left: 0; width: 3000px; height: 3000px; }

        /* 角色節點（舊照片風） */
        .character-node { 
            position: absolute; text-align: center; 
            transition: transform 0.1s; z-index: 10;
        }
        
        /* 4:3 垂直相框設定 (長*寬 4:3 垂直 portrait) */
        .avatar-frame {
            width: 60px; /* 寬度 */
            height: 80px; /* 高度 = 寬 * 4/3 */
            overflow: hidden; 
            border: 3px solid #8e6c46; /* 古舊銅框 */
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            background: #fff; /* 照片紙白底 */
            padding: 2px; /* 內縮照片紙白邊 */
            margin: 0 auto;
            border-radius: 2px;
        }
        .avatar { 
            width: 100%; height: 100%; object-fit: cover; 
            pointer-events: none;
            /* 復古濾鏡 */
            filter: sepia(0.3) contrast(1.1);
        }
        
        /* 姓名文字 - 清爽純文字，不加底色 */
        .name { 
            font-size: 14px; margin-top: 8px; font-weight: bold; 
            color: #1a1a1a; pointer-events: none; text-shadow: none;
        }

        /* 長按跳出的浮動氣泡選單 (模仿 iPhone 風格) */
        #context-menu {
            position: fixed; display: none; background: var(--ios-menu-bg); 
            border-radius: 12px; z-index: 3000; overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            /* iOS 风格的毛玻璃模糊感 */
            backdrop-filter: blur(10px);
            min-width: 130px;
        }
        
        /* iPhone風格選單項目 */
        .context-item {
            padding: 12px 18px; cursor: pointer; font-size: 16px; 
            color: #1c1c1e; border-bottom: 1px solid rgba(100,100,100,0.2);
            text-align: center; font-family: -apple-system, sans-serif; /* 保持 iPhone 原生介面感 */
            letter-spacing: 0.5px;
        }
        /* 刪除角色變紅色 */
        .context-item:last-child { border-bottom: none; color: #ff3b30; } 
        /* 按下項目變灰色 */
        .context-item:active { background-color: rgba(200,200,200,0.5); }

        /* 備註彈出視窗復古風 */
        #note-modal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 85%; max-width: 400px; background: var(--modal-bg); 
            border-radius: 15px; padding: 25px; display: none; z-index: 4000; 
            border: 2px solid var(--accent-bronze);
            background-image: url('https://www.transparenttextures.com/patterns/old-paper.png');
        }
        textarea { 
            width: 100%; height: 180px; background: #e0d5b5; color: #1a1a1a; 
            border: 1px solid var(--accent-bronze); border-radius: 8px; 
            padding: 12px; box-sizing: border-box; resize: none; margin: 15px 0; 
            font-family: inherit; font-size: 14px;
        }
    </style>
</head>
<body>

<div id="menu-btn" onclick="toggleMenu()">☰</div>

<div id="sidebar">
    <div style="text-align:center; font-size:18px; font-weight:bold; color:var(--accent-bronze); margin-bottom: 20px;">
        史料檔案
    </div>
    
    <div style="margin-bottom: 30px;">
        <h4>新增角色檔案</h4>
        <input type="text" id="charName" placeholder="輸入角色姓名">
        <label style="font-size: 12px; color: #d8c4a9;">上傳照片 (將被裁切為 4:3)：</label>
        <input type="file" id="charImg" accept="image/*">
        <button class="btn" onclick="addNode()">建立檔案</button>
    </div>
        <div style="margin-bottom: 30px;">
        <h4>設定畫布</h4>
        <button class="btn" style="background:#555" onclick="localStorage.clear(); location.reload();">清空所有檔案</button>
    </div>
</div>

<div id="canvas"></div>

<div id="context-menu">
    <div class="context-item" onclick="openNote()">編輯備註</div>
    <div class="context-item" onclick="renameNode()">編輯名稱</div>
    <div class="context-item" onclick="deleteNode()">刪除角色</div>
</div>

<div id="note-modal">
    <h3 id="note-title" style="margin-top:0; color:var(--sidebar-leather);">人物檔案</h3>
    <textarea id="note-text" placeholder="在關於這個角色..."></textarea>
    <button class="btn" onclick="saveNote()">儲存檔案並關閉</button>
</div>

<script>
    let nodes = [];
    let activeNodeNodeData = null; // 儲存當前被長按的角色數據
    let longPressTimer;

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

    function addNode() {
        const name = document.getElementById('charName').value;
        const file = document.getElementById('charImg').files[0];
        if(!name || !file) { alert('米塔，要填寫姓名並上傳照片，才能建立檔案歐！'); return; }

        const reader = new FileReader();
        reader.onload = function(e) {
            // 在畫布中心偏上生成
            const node = { id: Date.now(), name: name, img: e.target.result, x: 100, y: 150, note: '' };
            nodes.push(node);
            render();
            toggleMenu();
            // 清空輸入框
            document.getElementById('charName').value = '';
            document.getElementById('charImg').value = ''; 
        };
        reader.readAsDataURL(file);
    }

    function render() {
        const canvas = document.getElementById('canvas');
        canvas.innerHTML = ''; // 清空畫布

        nodes.forEach(node => {
            const div = document.createElement('div');
            div.className = 'character-node';
            div.style.left = node.x + 'px';
            div.style.top = node.y + 'px';
            
            // 4:3 垂直矩形頭像相框
            div.innerHTML = `
                <div class="avatar-frame">
                    <img src="${node.img}" class="avatar">
                </div>
                <div class="name">${node.name}</div>
            `;
            
            // 手機拖拽與長按 1.5 秒跳出選單邏輯
            div.ontouchstart = (e) => {
                activeNodeNodeData = node;
                // 設定長按計時器（1500毫秒 = 1.5秒）
                longPressTimer = setTimeout(() => {
                    showContextMenu(e);
                }, 1500);
            };

            div.ontouchend = () => {
                // 如果在 1.5 秒內手放開，就取消長按計時器
                clearTimeout(longPressTimer);
            };

            div.ontouchmove = (e) => {
                // 如果手指一移動，就代表只是要拖曳，取消長按
                clearTimeout(longPressTimer);
                
                // 拖曳邏輯
                let touch = e.touches[0];
                node.x = touch.pageX - 40;
                node.y = touch.pageY - 40;
                div.style.left = node.x + 'px';
                div.style.top = node.y + 'px';
                // 防止拖曳時網頁被上下滑動
                e.preventDefault(); 
            };
            canvas.appendChild(div);
        });
        saveToLocal();
    }

    // iPhone 風格浮動選單功能
    function showContextMenu(e) {
        const menu = document.getElementById('context-menu');
        menu.style.display = 'block';
        
        // 抓取手指碰觸的位置歐
        let touch = e.touches[0];
        // 把選單顯示在頭像上方
        menu.style.left = touch.pageX - 65 + 'px'; 
        menu.style.top = touch.pageY - 160 + 'px'; 
    }

    // 按下氣泡選單功能後隱藏選單
    function hideMenu() { 
        const menu = document.getElementById('context-menu');
        menu.style.display = 'none'; 
    }
    
    // 如果點擊主頁面（除了選單外），也隱藏選單
    window.onclick = function(event) {
        if (event.target !== document.getElementById('context-menu')) {
            hideMenu();
        }
    };

    // 氣泡選單的各項功能
    function openNote() {
        document.getElementById('note-title').innerText = activeNodeNodeData.name + ' 的祕辛檔案';
        document.getElementById('note-text').value = activeNodeNodeData.note || '';
        document.getElementById('note-modal').style.display = 'block';
        hideMenu();
    }

    function renameNode() {
        const newName = prompt('請輸入新的檔案名稱：', activeNodeNodeData.name);
        if(newName) {
            activeNodeNodeData.name = newName;
            render();
        }
        hideMenu();
    }

    function deleteNode() {
        if(confirm(`確定要永久刪除 "${activeNodeNodeData.name}" 的家族檔案嗎？`)) {
            nodes = nodes.filter(n => n.id !== activeNodeNodeData.id);
            render();
        }
        hideMenu();
    }

    // 彈窗功能
    function saveNote() {
        activeNodeNodeData.note = document.getElementById('note-text').value;
        document.getElementById('note-modal').style.display = 'none';
        saveToLocal();
    }

    // 資料儲存功能
    function saveToLocal() { localStorage.setItem('mita_castle_v5_data', JSON.stringify(nodes)); }
    function loadLocal() {
        const data = localStorage.getItem('mita_castle_v5_data');
        if(data) { nodes = JSON.parse(data); render(); }
    }

    window.onload = loadLocal;
</script>

</body>
</html>
