<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶典</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-parchment: #F5EEDC; 
            --text-classic: #2c2c2c; 
            --accent-bronze: #C5A059; 
            --sidebar-leather: #4B3621; 
            --ios-menu-bg: rgba(240, 240, 240, 0.96);
        }
        
        body { 
            margin: 0; font-family: 'EB Garamond', serif; 
            background: var(--bg-parchment); color: var(--text-classic); 
            overflow: hidden; touch-action: none; 
            background-image: url('https://www.transparenttextures.com/patterns/old-paper.png');
        }
        
        /* 選單按鈕 */
        #menu-btn { 
            position: fixed; top: 20px; left: 20px; z-index: 2000; 
            background: var(--sidebar-leather); border: 2px solid var(--accent-bronze);
            color: var(--accent-bronze); width: 45px; height: 45px; 
            border-radius: 8px; font-size: 28px; display: flex; 
            align-items: center; justify-content: center; cursor: pointer;
        }

        /* 側邊選單內容 */
        #sidebar { 
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%; 
            background: var(--sidebar-leather); transition: 0.3s; z-index: 1999;
            padding: 80px 20px 20px; box-shadow: 2px 0 15px rgba(0,0,0,0.5);
            overflow-y: auto; border-right: 2px solid var(--accent-bronze);
            color: #d8c4a9; box-sizing: border-box;
        }
        #sidebar.open { left: 0; }
        #sidebar h4 { color: var(--accent-bronze); margin: 20px 0 10px; border-bottom: 1px solid var(--accent-bronze); padding-bottom: 5px; font-size: 16px; }

        input, select { 
            width: 100%; padding: 10px; margin-bottom: 10px; 
            background: #d8c4a9; border: 1px solid var(--sidebar-leather); 
            color: var(--sidebar-leather); border-radius: 4px; box-sizing: border-box;
            font-family: inherit;
        }
        .btn { 
            width: 100%; padding: 12px; background: var(--accent-bronze); border: none; 
            color: var(--sidebar-leather); border-radius: 6px; cursor: pointer; 
            font-size: 15px; font-weight: bold; font-family: inherit; margin-bottom: 5px;
        }
        
        /* 畫布 */
        #canvas { position: absolute; top: 0; left: 0; width: 3000px; height: 3000px; }
        
        /* 線條畫布 (SVG) */
        #line-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 5; }

        /* 角色相框 (4:3) */
        .character-node { position: absolute; text-align: center; z-index: 10; }
        .avatar-frame {
            width: 60px; height: 80px; overflow: hidden; 
            border: 3px solid #8e6c46; box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            background: #fff; padding: 2px; margin: 0 auto; border-radius: 2px;
        }
        .avatar { width: 100%; height: 100%; object-fit: cover; filter: sepia(0.2); }
        .name { font-size: 14px; margin-top: 8px; font-weight: bold; color: #1a1a1a; }

        /* iPhone 長按選單 */
        #context-menu {
            position: fixed; display: none; background: var(--ios-menu-bg); 
            border-radius: 12px; z-index: 3000; overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); backdrop-filter: blur(10px); min-width: 130px;
        }
        .context-item { padding: 12px 18px; cursor: pointer; font-size: 16px; color: #1c1c1e; border-bottom: 1px solid rgba(100,100,100,0.2); text-align: center; }
        .context-item:last-child { border-bottom: none; color: #ff3b30; }

        /* 備註彈窗 */
        #note-modal { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 85%; max-width: 400px; background: #FAF3E0; border-radius: 15px; padding: 25px; 
            display: none; z-index: 4000; border: 2px solid var(--accent-bronze);
            background-image: url('https://www.transparenttextures.com/patterns/old-paper.png');
        }
        textarea { width: 100%; height: 180px; background: #e0d5b5; border: 1px solid var(--accent-bronze); border-radius: 8px; padding: 12px; box-sizing: border-box; resize: none; margin: 15px 0; font-family: inherit; }
    </style>
</head>
<body>

<div id="menu-btn" onclick="toggleMenu()">☰</div>

<div id="sidebar">
    <div style="text-align:center; font-size:18px; font-weight:bold; color:var(--accent-bronze);">史料檔案</div>
    
    <h4>新增角色檔案</h4>
    <input type="text" id="charName" placeholder="輸入姓名">
    <input type="file" id="charImg" accept="image/*">
    <button class="btn" onclick="addNode()">建立檔案</button>

    <h4>建立人物關係</h4>
    <select id="fromNode"></select>
    <select id="toNode"></select>
    <button class="btn" onclick="addLink()">連接線條</button>

    <h4>背景與線條設定</h4>
    <label style="font-size:12px">畫布背景：</label>
    <input type="color" id="bgColor" value="#F5EEDC" onchange="updateColors()">
    <label style="font-size:12px">連線顏色：</label>
    <input type="color" id="lineColor" value="#8e6c46" onchange="updateLines()">

    <h4 style="margin-top:40px; color:#888; border-color:#555">危險區域</h4>
    <button class="btn" style="background:#555; color:#fff" onclick="clearAllData()">清空所有檔案</button>
</div>

<svg id="line-canvas" width="3000" height="3000"></svg>
<div id="canvas"></div>

<div id="context-menu">
    <div class="context-item" onclick="openNote()">查看/編輯備註</div>
    <div class="context-item" onclick="renameNode()">編輯名稱</div>
    <div class="context-item" onclick="deleteNode()">刪除角色</div>
</div>

<div id="note-modal">
    <h3 id="note-title" style="margin-top:0; color:#4B3621;">備忘錄</h3>
    <textarea id="note-text" placeholder="關於這個角色..."></textarea>
    <button class="btn" onclick="saveNote()">儲存</button>
</div>

<script>
    let nodes = [];
    let links = [];
    let activeNode = null;
    let longPressTimer;

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

    function addNode() {
        const name = document.getElementById('charName').value;
        const file = document.getElementById('charImg').files[0];
        if(!name || !file) { alert('米塔，名字跟照片都要有歐！'); return; }
        const reader = new FileReader();
        reader.onload = (e) => {
            nodes.push({ id: Date.now(), name: name, img: e.target.result, x: 100, y: 150, note: '' });
            render();
            document.getElementById('charName').value = '';
            document.getElementById('charImg').value = '';
        };
        reader.readAsDataURL(file);
    }

    function addLink() {
        const from = document.getElementById('fromNode').value;
        const to = document.getElementById('toNode').value;
        if(from && to && from !== to) {
            links.push({ from: parseInt(from), to: parseInt(to) });
            render();
        }
    }
        function render() {
        const canvas = document.getElementById('canvas');
        canvas.innerHTML = '';
        const fromSel = document.getElementById('fromNode');
        const toSel = document.getElementById('toNode');
        fromSel.innerHTML = toSel.innerHTML = '<option value="">選擇角色...</option>';

        nodes.forEach(node => {
            fromSel.innerHTML += `<option value="${node.id}">${node.name}</option>`;
            toSel.innerHTML += `<option value="${node.id}">${node.name}</option>`;

            const div = document.createElement('div');
            div.className = 'character-node';
            div.style.left = node.x + 'px'; div.style.top = node.y + 'px';
            div.innerHTML = `<div class="avatar-frame"><img src="${node.img}" class="avatar"></div><div class="name">${node.name}</div>`;
            
            div.ontouchstart = (e) => {
                activeNode = node;
                longPressTimer = setTimeout(() => {
                    const menu = document.getElementById('context-menu');
                    menu.style.display = 'block';
                    menu.style.left = e.touches[0].pageX + 'px';
                    menu.style.top = e.touches[0].pageY + 'px';
                }, 1500);
            };
            div.ontouchend = () => clearTimeout(longPressTimer);
            div.ontouchmove = (e) => {
                clearTimeout(longPressTimer);
                node.x = e.touches[0].pageX - 40;
                node.y = e.touches[0].pageY - 40;
                div.style.left = node.x + 'px'; div.style.top = node.y + 'px';
                updateLines();
                e.preventDefault();
            };
            canvas.appendChild(div);
        });
        updateLines();
        saveData();
    }

    function updateLines() {
        const svg = document.getElementById('line-canvas');
        svg.innerHTML = '';
        const color = document.getElementById('lineColor').value;
        links.forEach(link => {
            const n1 = nodes.find(n => n.id === link.from);
            const n2 = nodes.find(n => n.id === link.to);
            if(n1 && n2) {
                const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
                l.setAttribute("x1", n1.x + 40); l.setAttribute("y1", n1.y + 40);
                l.setAttribute("x2", n2.x + 40); l.setAttribute("y2", n2.y + 40);
                l.setAttribute("stroke", color); l.setAttribute("stroke-width", "2");
                svg.appendChild(l);
            }
        });
    }

    function updateColors() { document.body.style.backgroundColor = document.getElementById('bgColor').value; }
    function openNote() { 
        document.getElementById('note-title').innerText = activeNode.name + ' 的寶典';
        document.getElementById('note-text').value = activeNode.note || '';
        document.getElementById('note-modal').style.display = 'block';
        hideMenu();
    }
    function saveNote() { activeNode.note = document.getElementById('note-text').value; document.getElementById('note-modal').style.display = 'none'; saveData(); }
    function renameNode() { const n = prompt('新名稱：', activeNode.name); if(n) { activeNode.name = n; render(); } hideMenu(); }
    function deleteNode() { if(confirm('刪除檔案')) { nodes = nodes.filter(n => n.id !== activeNode.id); links = links.filter(l => l.from !== activeNode.id && l.to !== activeNode.id); render(); } hideMenu(); }
    function hideMenu() { document.getElementById('context-menu').style.display = 'none'; }
    function clearAllData() { if(confirm('確定刪除')) { localStorage.clear(); location.reload(); } }
    window.onclick = (e) => { if(e.target.id === 'canvas') hideMenu(); };
    function saveData() { localStorage.setItem('mita_vintage_final', JSON.stringify({nodes, links})); }
    function loadData() {
        const d = JSON.parse(localStorage.getItem('mita_vintage_final'));
        if(d) { nodes = d.nodes; links = d.links; render(); }
    }
    window.onload = loadData;
</script>
</body>
</html>
