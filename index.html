<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>人物關係管理系統</title>
    <script src="https://cdn.jsdelivr.net/npm/leader-line/leader-line.min.js"></script>
    <style>
        :root { --primary: #1a1a1a; --accent: #8e44ad; --text: #dcdcdc; --card: #252525; }
        body { margin: 0; font-family: "PingFang TC", sans-serif; background: #121212; color: var(--text); overflow: hidden; touch-action: none; }
        
        /* 左上角漢堡選單按鈕 */
        #menu-btn { 
            position: fixed; top: 20px; left: 20px; z-index: 2000; 
            background: var(--primary); border: 1px solid var(--accent);
            color: white; width: 45px; height: 45px; border-radius: 8px;
            font-size: 24px; display: flex; align-items: center; justify-content: center;
        }

        /* 側邊隱藏選單 */
        #sidebar { 
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%; 
            background: var(--primary); transition: 0.3s; z-index: 1999;
            padding: 80px 20px 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            overflow-y: auto; border-right: 1px solid var(--accent);
        }
        #sidebar.open { left: 0; }

        /* 區塊樣式 */
        .menu-section { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #333; }
        .menu-section h4 { margin: 0 0 10px; color: var(--accent); font-size: 14px; }
        input, select { width: 100%; padding: 8px; margin-bottom: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        
        /* 畫布 */
        #canvas { position: absolute; top: 0; left: 0; width: 3000px; height: 3000px; }

        /* 角色節點 */
        .character-node { 
            position: absolute; width: 80px; text-align: center; 
            transition: transform 0.1s; z-index: 10;
        }
        .avatar { 
            width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--accent); 
            object-fit: cover; background: #333; margin: 0 auto; pointer-events: none;
        }
        .name { font-size: 13px; margin-top: 5px; font-weight: bold; pointer-events: none; }

        /* 長按跳出的浮動選單 (iPhone 風) */
        #context-menu {
            position: fixed; display: none; background: #333; border-radius: 12px;
            padding: 5px; z-index: 3000; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            min-width: 100px;
        }
        .context-item {
            padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #444;
            text-align: center; color: white; font-size: 14px;
        }
        .context-item:last-child { border-bottom: none; color: #ff4d4d; }

        /* 常用按鈕 */
        .btn { 
            width: 100%; padding: 10px; background: var(--accent); border: none; 
            color: white; border-radius: 6px; cursor: pointer; font-size: 14px; 
        }
    </style>
</head>
<body>

<div id="menu-btn" onclick="toggleMenu()">☰</div>

<div id="sidebar">
    <div class="menu-section">
        <h4>新增角色</h4>
        <input type="text" id="charName" placeholder="角色姓名">
        <label style="font-size: 11px; color: #888;">上傳頭像：</label>
        <input type="file" id="charImg" accept="image/*">
        <button class="btn" onclick="addNode()">建立角色</button>
    </div>

    <div class="menu-section">
        <h4>建立關聯</h4>
        <select id="fromNode"></select>
        <select id="toNode"></select>
        <button class="btn" onclick="addLink()">連接線條</button>
    </div>

    <div class="menu-section">
        <h4>背景與線條設定</h4>
        <label style="font-size: 11px;">背景顏色：</label>
        <input type="color" id="bgColor" value="#121212" onchange="updateColors()">
        <label style="font-size: 11px;">線條顏色：</label>
        <input type="color" id="lineColor" value="#8e44ad" onchange="updateColors()">
    </div>

    <div class="menu-section">
        <button class="btn" style="background:#2ecc71" onclick="alert('關係圖已儲存於瀏覽器歐！')">儲存關係圖</button>
    </div>
</div>

<div id="canvas"></div>

<div id="context-menu">
    <div class="context-item" onclick="editCurrentNode()">編輯名稱</div>
    <div class="context-item" onclick="deleteCurrentNode()">刪除角色</div>
</div>

<div id="sidebar">
    <h3 style="margin-top: 0;">角色管理</h3>
    <input type="text" id="charName" placeholder="輸入角色姓名">
    <label style="font-size: 12px; color: #888;">上傳頭像：</label>
    <input type="file" id="charImg" accept="image/*">
    <div id="charList" style="margin-top: 20px;"></div>
</div>

<div id="canvas">
    </div>
    <script>
    let nodes = [];
    let lines = [];
    let currentTargetNode = null;
    let longPressTimer;

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

    function addNode() {
        const name = document.getElementById('charName').value;
        const file = document.getElementById('charImg').files[0];
        if(!name || !file) { alert('米塔，要同時有名字跟頭像才能新增歐！'); return; }

        const reader = new FileReader();
        reader.onload = function(e) {
            const node = { id: Date.now(), name: name, img: e.target.result, x: 100, y: 150 };
            nodes.push(node);
            render();
            toggleMenu();
            document.getElementById('charName').value = '';
        };
        reader.readAsDataURL(file);
    }

    function render() {
        const canvas = document.getElementById('canvas');
        canvas.innerHTML = '';
        const fromSel = document.getElementById('fromNode');
        const toSel = document.getElementById('toNode');
        fromSel.innerHTML = toSel.innerHTML = '';

        nodes.forEach(node => {
            // 更新下拉選單
            let opt = `<option value="${node.id}">${node.name}</option>`;
            fromSel.innerHTML += opt; toSel.innerHTML += opt;

            const div = document.createElement('div');
            div.className = 'character-node';
            div.style.left = node.x + 'px';
            div.style.top = node.y + 'px';
            div.innerHTML = `<img src="${node.img}" class="avatar"><div class="name">${node.name}</div>`;
            
            // 手機拖拽與長按
            div.ontouchstart = (e) => {
                currentTargetNode = node;
                longPressTimer = setTimeout(() => showContextMenu(e), 1500);
            };
            div.ontouchend = () => clearTimeout(longPressTimer);
            div.ontouchmove = (e) => {
                clearTimeout(longPressTimer);
                let touch = e.touches[0];
                node.x = touch.pageX - 40;
                node.y = touch.pageY - 40;
                div.style.left = node.x + 'px';
                div.style.top = node.y + 'px';
                updateLines();
            };
            canvas.appendChild(div);
        });
        updateLines();
    }

    function showContextMenu(e) {
        const menu = document.getElementById('context-menu');
        let touch = e.touches[0];
        menu.style.display = 'block';
        menu.style.left = touch.pageX + 'px';
        menu.style.top = touch.pageY + 'px';
    }

    window.onclick = () => document.getElementById('context-menu').style.display = 'none';

    function deleteCurrentNode() {
        nodes = nodes.filter(n => n.id !== currentTargetNode.id);
        render();
    }

    function editCurrentNode() {
        const newName = prompt('請輸入新的角色名稱：', currentTargetNode.name);
        if(newName) { currentTargetNode.name = newName; render(); }
    }

    function addLink() {
        const from = document.getElementById('fromNode').value;
        const to = document.getElementById('toNode').value;
        if(from === to) return;
        lines.push({ from, to });
        updateLines();
    }

    function updateLines() {
        // 這邊簡化處理，實際建議使用畫布重繪
        console.log("線條更新中...");
    }

    function updateColors() {
        document.body.style.background = document.getElementById('bgColor').value;
    }
</script>

</body>
</html>
